# ── Server ──────────────────────────────────────────────────
spring.config.import=optional:classpath:.env[.properties]
server.port=${PORT:8080}

# ── Database (Supabase PostgreSQL) ───────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ── Supabase ────────────────────────────────────────────────
supabase.url=${SUPABASE_URL}
supabase.anon-key=${SUPABASE_ANON_KEY}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── SQL Init (runs schema.sql on startup) ─────────────────────
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ── HikariCP Connection Pool ─────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── Multipart (file uploads) ─────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── JWT ─────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000

# ── Google Gemini ───────────────────────────────────────────
app.gemini.api-key-primary=${APP_GEMINI_API_KEY_PRIMARY}
app.gemini.api-key-secondary=${APP_GEMINI_API_KEY_SECONDARY}

app.gemini.model=gemini-2.5-flash
app.gemini.endpoint=https://generativelanguage.googleapis.com/v1beta/models

# ── HuggingFace (Predictive Risk ML) ─────────────────────────
app.huggingface.api-key=${APP_HUGGINGFACE_API_KEY}
app.huggingface.endpoint=https://router.huggingface.co/v1/chat/completions

# ── SOS Thresholds ──────────────────────────────────────────
app.sos.bp-systolic-high=180
app.sos.bp-diastolic-high=120
app.sos.blood-sugar-high=300
app.sos.blood-sugar-low=50

# ── Logging ─────────────────────────────────────────────────
logging.level.com.healthcare.vitalsync=DEBUG
logging.level.org.springframework.security=INFO

spring.sql.init.separator=@@
